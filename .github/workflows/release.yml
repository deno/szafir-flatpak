name: Build and Release Bundle

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build proxy bundle and repo apps
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Flatpak and flatpak-builder
        run: |
          sudo apt-get update
          sudo apt-get install -y flatpak flatpak-builder elfutils cmake

      - name: Determine proxy source version
        id: proxy_version
        run: |
          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            VERSION="${GITHUB_REF_NAME#v}"
          else
            VERSION=$(scripts/get_proxy_version.sh)
          fi
          if [ -z "$VERSION" ]; then
            echo "Failed to determine proxy version" >&2
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Build proxy source release archive (CPack)
        run: |
          cmake -S szafir-host-proxy -B build-source-release \
            -DSZAFIR_HOST_PROXY_SOURCE_PACKAGE_ONLY=ON \
            -DAPP_VERSION=${{ steps.proxy_version.outputs.version }}
          cmake --build build-source-release --target package_source
          SOURCE_ARCHIVE="build-source-release/szafir-host-proxy-${{ steps.proxy_version.outputs.version }}-source.tar.gz"
          if [ ! -f "$SOURCE_ARCHIVE" ]; then
            echo "Missing source archive: $SOURCE_ARCHIVE" >&2
            exit 1
          fi
          sha256sum "$SOURCE_ARCHIVE" > "$SOURCE_ARCHIVE.sha256"

      - name: Set up Flathub
        run: |
          flatpak remote-add --user --if-not-exists flathub https://flathub.org/repo/flathub.flatpakrepo

      - name: Install runtime and SDK
        run: |
          flatpak install --user -y --noninteractive flathub \
            org.kde.Platform/x86_64/6.10 \
            org.kde.Sdk/x86_64/6.10 \
            org.freedesktop.Platform/x86_64/25.08 \
            org.freedesktop.Sdk/x86_64/25.08 \
            org.freedesktop.Sdk.Extension.openjdk25/x86_64/25.08

      - name: Build proxy (extra-empty)
        run: |
          flatpak-builder --user --repo=repo --force-clean --disable-rofiles-fuse build-dir-proxy \
            pl.deno.kir.szafirhostproxy-inprocess--extra-empty.yml

      - name: Build standalone Szafir (repo only)
        run: |
          flatpak-builder --user --repo=repo --force-clean --disable-rofiles-fuse build-dir-szafir \
            pl.kir.szafir.yml

      - name: Create bundle
        run: |
          flatpak build-bundle repo \
            pl.deno.kir.szafirhostproxy-inprocess--extra-empty.flatpak \
            pl.deno.kir.szafirhostproxy

      - name: Archive repo
        run: tar -cf szafir-release-repo.tar repo

      - name: Upload bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: bundle-pl.deno.kir.szafirhostproxy-extra-empty
          path: pl.deno.kir.szafirhostproxy-inprocess--extra-empty.flatpak

      - name: Upload proxy source artifact
        uses: actions/upload-artifact@v4
        with:
          name: source-szafir-host-proxy
          path: |
            build-source-release/szafir-host-proxy-${{ steps.proxy_version.outputs.version }}-source.tar.gz
            build-source-release/szafir-host-proxy-${{ steps.proxy_version.outputs.version }}-source.tar.gz.sha256

      - name: Upload repo artifact
        uses: actions/upload-artifact@v4
        with:
          name: repo-szafir-release
          path: szafir-release-repo.tar

  release:
    name: Attach bundle to GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download bundle
        uses: actions/download-artifact@v4
        with:
          name: bundle-pl.deno.kir.szafirhostproxy-extra-empty

      - name: Download proxy source
        uses: actions/download-artifact@v4
        with:
          name: source-szafir-host-proxy

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            pl.deno.kir.szafirhostproxy-inprocess--extra-empty.flatpak
            szafir-host-proxy-*-source.tar.gz
            szafir-host-proxy-*-source.tar.gz.sha256

  deploy-repo:
    name: Deploy Flatpak repository
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Install OSTree and Flatpak
        run: |
          sudo apt-get update
          sudo apt-get install -y ostree flatpak

      - name: Validate GPG key
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
        run: |
          if [ -z "$GPG_PRIVATE_KEY" ]; then
            echo "Error: GPG_PRIVATE_KEY secret is not set."
            exit 1
          fi
          echo "$GPG_PRIVATE_KEY" | base64 -d | gpg --batch --import

      - name: Download repo artifact
        uses: actions/download-artifact@v4
        with:
          name: repo-szafir-release
          path: app-repos

      - name: Extract and merge into unified repo
        run: |
          ostree init --mode=archive-z2 --repo=repo
          for tarball in app-repos/*.tar; do
            dir="${tarball%.tar}"
            mkdir -p "$dir"
            tar -xf "$tarball" -C "$dir"
            ostree pull-local --repo=repo "$dir/repo"
          done

      - name: Sign, finalize, and generate .flatpakrepo
        run: |
          KEY_ID=$(gpg --list-secret-keys --with-colons | awk -F: '/^sec/{print $5; exit}')
          PUBLIC_KEY_B64=$(gpg --export "$KEY_ID" | base64 -w0)
          REPO_URL="https://${GITHUB_REPOSITORY_OWNER}.github.io/${GITHUB_REPOSITORY#*/}/"

          for ref in $(ostree refs --repo=repo); do
            ostree gpg-sign --repo=repo "$ref" "$KEY_ID"
          done

          flatpak build-update-repo --title="Szafir Flatpak Repository" \
            --gpg-sign="$KEY_ID" --generate-static-deltas repo

          printf '[Flatpak Repo]\nTitle=Szafir Flatpak Repository\nUrl=%s\nHomepage=https://github.com/%s\nComment=Stable Flatpak packages for Szafir and SzafirHostProxy\nDescription=Official release repository for szafir-flatpak.\nGPGKey=%s\n' \
            "$REPO_URL" "$GITHUB_REPOSITORY" "$PUBLIC_KEY_B64" > repo/szafir.flatpakrepo

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: repo

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
