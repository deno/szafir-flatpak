app-id: pl.kir.szafirhost
runtime: org.freedesktop.Platform
runtime-version: '25.08'
sdk: org.freedesktop.Sdk
command: start-szafir-host-native.sh

sdk-extensions:
  - org.freedesktop.Sdk.Extension.openjdk25

finish-args:
  - --socket=pcsc
  - --share=network
  - --socket=x11
  - --share=ipc
  - --device=dri
  - --persist=.java
  - --env=PATH=/app/jre/bin:/app/bin:/usr/bin
  - --env=JAVA_HOME=/app/jre

cleanup:
  - /include
  - /bin/pcsc-spy
  - /lib/libpcscspy*
  - /lib/pkgconfig
  - /share/doc
  - /share/man
  - /sbin

modules:
  - name: openjdk
    buildsystem: simple
    build-commands:
      - /usr/lib/sdk/openjdk25/install.sh

  - name: pcsc-lite
    buildsystem: meson
    config-opts:
      - -Dlibudev=false
      - -Dlibsystemd=false
      - -Dusb=false
      - -Dlibusb=false
      - -Dpolkit=false
      - -Dserial=false
      - -Dipcdir=/run/pcscd
    post-install:
      - install -Dm644 ../COPYING /app/share/licenses/$FLATPAK_ID/pcsc-lite/COPYING
    sources:
      - type: archive
        url: https://pcsclite.apdu.fr/files/pcsc-lite-2.3.3.tar.xz
        sha256: cdff7d7153a0b37aa74e26dfec89ec7dc5c5286aa21b91b903e38739d227e8e7

  - name: szafirhost
    buildsystem: simple
    build-commands:
      - install -D -m 755 start-szafir-host-native.sh /app/bin/start-szafir-host-native.sh
      - install -D -m 644 pl.kir.szafirhost.metainfo.xml /app/share/metainfo/pl.kir.szafirhost.metainfo.xml
    sources:
      - type: file
        path: start-szafir-host-native.sh
      - type: file
        path: pl.kir.szafirhost.metainfo.xml
      - type: extra-data
        filename: szafirhost-install.jar
        url: https://storage.googleapis.com/cdn.elektronicznypodpis.pl/SzafirHost/szafirhost-install.jar
        sha256: b674a63d385e7392e1827c777bee7076ffed1bef7d17d900f9422635c99b2c72
        size: 35307060
      - type: extra-data
        filename: libCCGraphiteP11.2.0.5.6.so
        url: https://www.elektronicznypodpis.pl/storage/file/core_files/2024/8/29/176c2c69984e86b0af3faf041037e26b/libCCGraphiteP11.2.0.5.6.so
        sha256: 856d00360b53457fb49a233fff5c6c568834ba3a35a4102cf540ddb0e61e011e
        size: 6659848
